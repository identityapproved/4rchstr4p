unbind r
bind r source-file "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/tmux.conf"

set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",foot:RGB"

unbind C-b
set -g prefix M-a
set -g prefix2 M-Space
bind M-Space send-prefix
set -sg escape-time 0

# Splitting Windows
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# VIM motions
setw -g mode-keys vi
# Pane resize
bind -r h resize-pane -L 13
bind -r j resize-pane -D 13
bind -r k resize-pane -U 13
bind -r l resize-pane -R 13

# Pane selection
# bind-key h select-pane -L
# bind-key j select-pane -D
# bind-key k select-pane -U
# bind-key l select-pane -R

set -g mouse on
set -g history-limit 50000
set -g display-time 4000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Windows navigation
bind C-p previous-window
bind C-n next-window

# Copy-mode (vi): make v begin selection and V select line
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'christoomey/vim-tmux-navigator'

# python3 -m pip install --user libtmux
# yain python-libtmux
set -g @plugin 'ofirgall/tmux-window-name'
set -g @tmux_window_name_show_program_args "True"

set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-copycat'

set -g @plugin 'tmux-plugins/tmux-yank'
# set-clipboard on

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'

# Theme plugin
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'main'
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_show_current_program 'on'
set -g @rose_pine_show_pane_directory 'on'

# Status
set -g status-position top
# set-option -g status-style bg=default

if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
